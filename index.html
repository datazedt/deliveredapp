<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Barcode → Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --ink:#1b1f1a;
    --paper:#f6f4ee;
    --line:#1b1f1a;
    --go:#2f5d3a;
    --go-dark:#234a2c;
    --warn:#b5482a;
    --muted:#6b6f64;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:18px 20px 14px;
    border-bottom:2px solid var(--line);
  }
  header h1{
    margin:0;
    font-size:1.15rem;
    font-weight:700;
    letter-spacing:.01em;
  }
  header p{
    margin:4px 0 0;
    font-size:.8rem;
    color:var(--muted);
  }


  .login-screen{
    position:fixed;
    inset:0;
    background:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .login-box{
    width:100%;
    max-width:320px;
    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    padding:24px 20px;
  }
  .login-box h2{
    margin:0 0 16px;
    font-size:1.1rem;
  }
  .login-box label{
    display:block;
    font-size:.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .login-box input{
    width:100%;
    padding:10px 12px;
    font-size:.85rem;
    border:1.5px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    margin-bottom:12px;
  }
  .login-box input:focus{outline:2px solid var(--go); outline-offset:1px;}
  .login-error{
    color:var(--warn);
    font-size:.78rem;
    font-weight:600;
    margin-top:10px;
    min-height:16px;
  }

  .setup{
    margin:16px 20px;
    padding:14px 16px;
    border:1.5px dashed var(--line);
    border-radius:10px;
    background:#fff;
  }
  .setup label{
    display:block;
    font-size:.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .setup input{
    width:100%;
    padding:10px 12px;
    font-size:.85rem;
    border:1.5px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
  }
  .setup input:focus{outline:2px solid var(--go); outline-offset:1px;}

  #reader-wrap{
    margin:16px 20px 0;
    border:2px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    position:relative;
    background:#000;
  }
  #reader{width:100%;}
  #reader video{width:100% !important; border-radius:0 !important;}

  .scan-status{
    text-align:center;
    padding:10px;
    font-size:.85rem;
    font-weight:600;
    min-height:18px;
  }
  .scan-status.ok{color:var(--go);}
  .scan-status.err{color:var(--warn);}

  .controls{
    display:flex;
    gap:10px;
    margin:0 20px 16px;
  }
  button{
    font-family:inherit;
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:11px 14px;
    font-size:.85rem;
    font-weight:700;
    cursor:pointer;
    background:#fff;
    color:var(--ink);
  }
  button.primary{
    background:var(--go);
    border-color:var(--go-dark);
    color:#fff;
    flex:1;
  }
  button.primary:active{background:var(--go-dark);}
  button.secondary{flex:1;}
  button:disabled{opacity:.45; cursor:not-allowed;}

  .log{
    flex:1;
    margin:0 20px 20px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .log-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    border-bottom:1px solid #ddd9cb;
    font-size:.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
  }
  .log-head span.count{color:var(--ink);}
  ul.entries{
    list-style:none;
    margin:0;
    padding:0;
    max-height:260px;
    overflow-y:auto;
  }
  ul.entries li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    border-bottom:1px solid #eee9da;
    font-size:.85rem;
    gap:10px;
  }
  ul.entries li:last-child{border-bottom:none;}
  .code{font-family:"SF Mono",Menlo,monospace; word-break:break-all;}
  .pill{
    font-size:.65rem;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    white-space:nowrap;
  }
  .pill.sent{background:#e3efe2; color:var(--go-dark);}
  .pill.pending{background:#f1ecda; color:#8a6d1c;}
  .pill.fail{background:#f6e1da; color:var(--warn);}
  .empty{
    padding:24px 14px;
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
  }
  footer{
    text-align:center;
    font-size:.7rem;
    color:var(--muted);
    padding-bottom:14px;
  }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h2>Sign in</h2>
    <label for="loginUser">Username</label>
    <input id="loginUser" type="text" autocomplete="username">
    <label for="loginPass">Password</label>
    <input id="loginPass" type="password" autocomplete="current-password">
    <button class="primary" id="loginBtn" style="margin-top:10px;width:100%;">Sign in</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="appScreen" style="display:none;">

<header>
  <h1>SCAN DELIVERED 1Z  TRACKINGS</h1>
  <p>Scan with your camera. Every code gets added as a new row.</p>
</header>

<div class="setup">
  <label for="stationInput">Station</label>
  <input id="stationInput" type="text" placeholder="e.g. ORAN" autocomplete="off">
  <label for="driverInput" style="margin-top:10px;">COURSIER</label>
  <input id="driverInput" type="text" placeholder="e.g. MOHAMED AMINE" autocomplete="off">
</div>

<div id="reader-wrap">
  <div id="reader"></div>
</div>
<div id="scanStatus" class="scan-status"></div>

<div class="controls">
  <button class="primary" id="startBtn">Start camera</button>
  <button class="secondary" id="stopBtn" disabled>Stop</button>
</div>

<div class="controls">
  <button class="secondary" id="uploadBtn" style="flex:1;">Scan from photo</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none;">
</div>

<div class="controls" id="manualRow">
  <button class="secondary" id="manualBtn" style="flex:1;">SAISIR TRACKING</button>
</div>

<div class="setup" id="manualEntry" style="display:none;">
  <label for="manualInput">Barcode / code</label>
  <input id="manualInput" type="text" placeholder="Type the code here" autocomplete="off">
  <div class="controls" style="margin:10px 0 0;">
    <button class="primary" id="manualSubmitBtn" style="flex:1;">Add</button>
    <button class="secondary" id="manualCancelBtn" style="flex:1;">Cancel</button>
  </div>
</div>

<div class="log">
  <div class="log-head">
    <span>Scanned</span>
    <span class="count" id="countLabel">0</span>
  </div>
  <ul class="entries" id="entries"></ul>
</div>

<footer>Works in Chrome / Safari on phones. Needs camera permission (camera access requires https — GitHub Pages provides this automatically).</footer>

</div>

<script>
  // Paste your Google Apps Script Web App URL here:
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLwDVbR9DG6IhQwjcwljPKmYPvEb6j592OfvwQ-NUKMwcOMldyl9qTzEltNKASfalN/exec";

  // Simple login, verified against a "Users" tab in your Google Sheet
  // via the Apps Script doGet endpoint. NOTE: credentials still travel
  // in plain text — fine for keeping a small team organized, not for
  // protecting sensitive data.

  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');
  const loginUser = document.getElementById('loginUser');
  const loginPass = document.getElementById('loginPass');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');

  async function tryLogin() {
    const u = loginUser.value.trim();
    const p = loginPass.value;

    if (!u || !p) {
      loginError.textContent = 'Enter both username and password.';
      return;
    }

    loginBtn.disabled = true;
    loginError.textContent = 'Checking…';

    try {
      const url = WEB_APP_URL + '?action=login'
        + '&username=' + encodeURIComponent(u)
        + '&password=' + encodeURIComponent(p);
      const res = await fetch(url);
      const data = await res.json();

      if (data.valid) {
        sessionStorage.setItem('scannerLoggedIn', '1');
        loginScreen.style.display = 'none';
        appScreen.style.display = 'block';
      } else {
        loginError.textContent = 'Incorrect username or password.';
      }
    } catch (err) {
      loginError.textContent = 'Could not verify login — check connection.';
    } finally {
      loginBtn.disabled = false;
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

  // Stay logged in for this browser tab session
  if (sessionStorage.getItem('scannerLoggedIn') === '1') {
    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
  }

  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusEl = document.getElementById('scanStatus');
  const entriesEl = document.getElementById('entries');
  const countLabel = document.getElementById('countLabel');
  const stationInput = document.getElementById('stationInput');
  const driverInput = `${document.getElementById('driverInput').value}-${loginUser.value}`;

  let html5QrCode;
  let lastCode = null;
  let lastTime = 0;
  let scans = [];

  function render() {
    countLabel.textContent = scans.length;
    if (scans.length === 0) {
      entriesEl.innerHTML = '<li class="empty" style="display:block;">No scans yet — point the camera at a barcode.</li>';
      return;
    }
    entriesEl.innerHTML = scans.slice().reverse().map(s => `
      <li>
        <span class="code">${s.code}</span>
        <span class="pill ${s.status}">${s.status === 'sent' ? 'Sent' : s.status === 'pending' ? 'Sending…' : 'Failed'}</span>
      </li>
    `).join('');
  }

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'scan-status' + (type ? ' ' + type : '');
  }

  async function sendToSheet(entry) {
    const url = WEB_APP_URL;
    if (!url || url.includes('PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE')) {
      entry.status = 'fail';
      render();
      setStatus('No Web App URL set in the code yet.', 'err');
      return;
    }
    try {
      // no-cors keeps this working without extra Apps Script config,
      // but means we can't read the response — we assume success.
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          code: entry.code,
          timestamp: entry.timestamp,
          station: stationInput.value.trim(),
          driver: driverInput.value.trim()
        })
      });
      entry.status = 'sent';
      setStatus('Added "' + entry.code + '" to sheet ✓', 'ok');
    } catch (e) {
      entry.status = 'fail';
      setStatus('Could not reach the sheet. Check the URL / connection.', 'err');
    }
    render();
  }

  function onScanSuccess(decodedText) {
    const now = Date.now();
    if (decodedText === lastCode && now - lastTime < 2500) return; // debounce repeats
    lastCode = decodedText;
    lastTime = now;

    const entry = {
      code: decodedText,
      timestamp: new Date().toISOString(),
      status: 'pending'
    };
    scans.push(entry);
    render();
    sendToSheet(entry);

    playBeep();
    if (navigator.vibrate) navigator.vibrate(80);
  }

  // Short beep using the Web Audio API — no external sound file needed.
  let audioCtx;
  function playBeep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 1000;
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } catch (e) {
      // Audio not available — fail silently
    }
  }

  // Manual code entry
  const manualBtn = document.getElementById('manualBtn');
  const manualEntry = document.getElementById('manualEntry');
  const manualInput = document.getElementById('manualInput');
  const manualSubmitBtn = document.getElementById('manualSubmitBtn');
  const manualCancelBtn = document.getElementById('manualCancelBtn');

  manualBtn.addEventListener('click', () => {
    manualEntry.style.display = 'block';
    manualInput.value = '';
    manualInput.focus();
  });

  manualCancelBtn.addEventListener('click', () => {
    manualEntry.style.display = 'none';
  });

  function submitManualCode() {
    const code = manualInput.value.trim();
    if (!code) {
      manualInput.focus();
      return;
    }
    // Bypass debounce so the same code can be re-entered manually if needed
    lastCode = null;
    onScanSuccess(code);
    manualEntry.style.display = 'none';
  }

  manualSubmitBtn.addEventListener('click', submitManualCode);
  manualInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitManualCode(); });

  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // If the live camera is running, stop it first — both scanners
    // share the same #reader element.
    if (html5QrCode && !stopBtn.disabled) {
      await html5QrCode.stop();
      html5QrCode.clear();
      stopBtn.disabled = true;
      startBtn.disabled = false;
    }

    setStatus('Reading photo…');

    // Use a separate, throwaway scanner instance for file scans so it
    // doesn't clash with a possibly-running camera scanner.
    const fileScanner = new Html5Qrcode('reader');
    try {
      const decodedText = await fileScanner.scanFile(file, false);
      onScanSuccess(decodedText);
    } catch (err) {
      setStatus('No barcode found in that photo.', 'err');
    } finally {
      try { fileScanner.clear(); } catch (_) {}
      fileInput.value = ''; // allow re-selecting the same file later
    }
  });

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    setStatus('Starting camera…');
    html5QrCode = new Html5Qrcode('reader');
    try {
      await html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 150 } },
        onScanSuccess,
        () => {} // ignore per-frame "not found" errors
      );
      stopBtn.disabled = false;
      setStatus('Camera ready — point at a barcode.');
    } catch (e) {
      setStatus('Camera error: ' + e, 'err');
      startBtn.disabled = false;
    }
  });

  stopBtn.addEventListener('click', async () => {
    if (html5QrCode) {
      await html5QrCode.stop();
      html5QrCode.clear();
    }
    stopBtn.disabled = true;
    startBtn.disabled = false;
    setStatus('Camera stopped.');
  });

  render();
</script>

</body>
</html>
